name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-flight runs for the same PR/branch when a new push lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: swift build + swift test
    # macos-14 ships the Xcode 16 / Swift 6 toolchain that cairn targets.
    # macos-latest drifts; pin deliberately so the matrix is reproducible.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        # `maxim-lobanov/setup-xcode` discovers the right path on the
        # runner image regardless of GitHub's drift (e.g. Xcode_16.app
        # vs Xcode_16.4.app vs Xcode_16.5.app). Pinned to the latest
        # 16.x major so a future runner image update to Xcode 17 doesn't
        # silently bump our Swift toolchain.
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16"

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: swift build
        run: swift build

      - name: swift test
        # --parallel speeds the SPM test suite up; there's no test that
        # depends on shared mutable state on disk at the package level.
        run: swift test --parallel
