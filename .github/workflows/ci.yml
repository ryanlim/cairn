name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-flight runs for the same PR/branch when a new push lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: swift build + swift test
    # cairn targets Swift 6.3 / Xcode 26.x — pick the newest stable
    # runner image so the bundled Xcode is recent enough. macos-15
    # currently ships Xcode 16.4+ and is rolling forward to 26 as
    # GitHub refreshes the image. `latest-stable` lets the action
    # pick whichever Xcode 26+ is bundled at job time.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: swift build
        run: swift build

      - name: swift test
        # --parallel speeds the SPM test suite up; there's no test that
        # depends on shared mutable state on disk at the package level.
        run: swift test --parallel
