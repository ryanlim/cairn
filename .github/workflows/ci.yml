name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-flight runs for the same PR/branch when a new push lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: swift build + swift test
    # cairn targets Swift 6.3 / Xcode 26.x — pick the newest stable
    # runner image so the bundled Xcode is recent enough. macos-15
    # currently ships Xcode 16.4+ and is rolling forward to 26 as
    # GitHub refreshes the image. `latest-stable` lets the action
    # pick whichever Xcode 26+ is bundled at job time.
    runs-on: macos-15
    steps:
      # v5 is on Node 24. v4 is Node 20 and GitHub Actions will force-
      # migrate it to Node 24 on June 2, 2026; pinning ahead of that.
      - uses: actions/checkout@v5

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: swift build
        run: swift build

      # swift test still disabled, but for a different reason than
      # the pre-e451546 SIGTRAP (that was fixed). 17 assertion-level
      # failures remain when the full suite runs:
      #
      # - Cross-suite global-state leak on MockURLProtocol.handler.
      #   `@Suite(.serialized)` only serializes within a suite, not
      #   across suites, so ImmichClientHTTPTests and
      #   ImmichClientSyncStreamTests can interleave their handler
      #   writes. Tests pass individually; fail in combination
      #   (`«unknown» test` issues are the tell-tale concurrent
      #   handler clobber).
      # - SyncEvent fixtures missing the new required `type` key
      #   (decoder enforces it, fixtures predate the constraint).
      # - ImmichClient scope checks (sync.stream, sync.checkpoint.*)
      #   reject calls from tests that don't seed their API key
      #   with the required scopes.
      #
      # Each is real test debt. Re-enable this step once they're
      # resolved. `swift build` still catches compile-time
      # regressions on every push.
      # - name: swift test
      #   run: swift test
