name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-flight runs for the same PR/branch when a new push lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: swift build + swift test
    # cairn targets Swift 6.3 / Xcode 26.x — pick the newest stable
    # runner image so the bundled Xcode is recent enough. macos-15
    # currently ships Xcode 16.4+ and is rolling forward to 26 as
    # GitHub refreshes the image. `latest-stable` lets the action
    # pick whichever Xcode 26+ is bundled at job time.
    runs-on: macos-15
    steps:
      # v5 is on Node 24. v4 is Node 20 and GitHub Actions will force-
      # migrate it to Node 24 on June 2, 2026; pinning ahead of that.
      - uses: actions/checkout@v5

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: swift build
        run: swift build

      - name: swift test
        # --no-parallel because MockURLProtocol's handler is a
        # process-wide static and `@Suite(.serialized)` only serializes
        # within a suite, not across them. Parallel cross-suite runs
        # of ImmichClient{HTTP,SyncStream}Tests +
        # ServerAssetSyncCoordinatorTests stomp on each other's handler
        # registration; the symptom is ~17 spurious assertion failures
        # and "«unknown» test" issues attributed to handler clobber.
        # Serial sidesteps the design issue. Proper fix is to dispatch
        # the mock handler per-URLSessionConfiguration (e.g. via a
        # session-id HTTP header) so concurrent sessions don't share
        # state — bigger refactor, deferred. Speed cost is small
        # (~9s vs parallel on the current 637-test suite).
        run: swift test --no-parallel
