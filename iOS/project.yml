name: Cairn

# XcodeGen config — the single source of truth for the iOS Xcode project.
# Generate the .xcodeproj with `make generate` (or `xcodegen` from this dir).
# The .xcodeproj is gitignored; this YAML is what gets committed.

options:
  bundleIdPrefix: app.cairn
  deploymentTarget:
    iOS: "17.0"
  groupSortPosition: top
  generateEmptyDirectories: true
  developmentLanguage: en

# Local SPM packages — point at the parent directory where Package.swift lives.
# Both CairnCore and CairnIOSCore are produced by that one Package.swift.
packages:
  Cairn:
    path: ..

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    # PRODUCT_BUNDLE_IDENTIFIER and DEVELOPMENT_TEAM are intentionally left
    # blank here. Set them once via Xcode UI (Signing & Capabilities) — Xcode
    # writes them into the project file. XcodeGen preserves them on
    # regeneration via the `attributes:` block below.

targets:
  Cairn:
    type: application
    platform: iOS
    sources:
      - path: App
        excludes:
          - "**/*.md"
    dependencies:
      - package: Cairn
        product: CairnCore
      - package: Cairn
        product: CairnIOSCore
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: cairn
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        # Required for PhotoKit access. The string is shown in the iOS
        # permission prompt and on the app's Settings page — keep it honest
        # and specific so reviewers and users understand what we do with it.
        NSPhotoLibraryUsageDescription: >-
          cairn needs Full library access to detect photos you've deleted from
          your iPhone and reconcile them against your Immich server. Photos
          never leave your device or your Immich server.
        # Background refresh task identifier — must match the value passed to
        # BGTaskScheduler.shared.register() at app launch.
        BGTaskSchedulerPermittedIdentifiers:
          - app.cairn.refresh
        # Skips the App Store export-compliance question on every upload.
        # cairn uses only standard system crypto (CryptoKit SHA1) so this is true.
        ITSAppUsesNonExemptEncryption: false
        # Modern launch screen — empty dict is fine, defaults to a system-rendered
        # plain background. Add image references here later if we want a splash.
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1"            # iPhone only (no iPad for v1)
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        # Code signing — set DEVELOPMENT_TEAM via Xcode UI once. Leaving
        # these blank here keeps the YAML repo-portable.
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: ""
        PRODUCT_BUNDLE_IDENTIFIER: app.cairn.ios
