name: Cairn

# XcodeGen config — the single source of truth for the iOS Xcode project.
# Generate the .xcodeproj with `make generate` (or `xcodegen` from this dir).
# The .xcodeproj is gitignored; this YAML is what gets committed.

options:
  bundleIdPrefix: app.cairn
  deploymentTarget:
    iOS: "17.0"
  groupSortPosition: top
  generateEmptyDirectories: true
  developmentLanguage: en

# Local SPM packages — point at the parent directory where Package.swift lives.
# Both CairnCore and CairnIOSCore are produced by that one Package.swift.
packages:
  Cairn:
    path: ..

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    # PRODUCT_BUNDLE_IDENTIFIER and DEVELOPMENT_TEAM are pinned per-target
    # below. They're committed values (cairn is a single-developer project
    # — same constraint as the Matchfile), so XcodeGen regenerations don't
    # blow away signing config and `make beta` runs without an Xcode
    # round-trip.

targets:
  Cairn:
    type: application
    platform: iOS
    sources:
      - path: App
        excludes:
          - "**/*.md"
    dependencies:
      - package: Cairn
        product: CairnCore
      - package: Cairn
        product: CairnIOSCore
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: cairn
        CFBundleShortVersionString: "0.3.3"
        CFBundleVersion: "122"
        # Required for PhotoKit access. The string is shown in the iOS
        # permission prompt and on the app's Settings page — keep it honest
        # and specific so reviewers and users understand what we do with it.
        NSPhotoLibraryUsageDescription: >-
          cairn needs Full library access to detect photos you've deleted from
          your iPhone and reconcile them against your Immich server. Photos
          never leave your device or your Immich server.
        # Required for connections to LAN / .local / private-IP hosts on
        # iOS 14+. Self-hosted Immich is the canonical case — every
        # connection cairn makes goes to the user's chosen server, which
        # is typically on their home network. Without this key iOS may
        # silently deny the connection (-1004 NSURLErrorCannotConnect-
        # ToHost) before any TLS / HTTP work happens. Field-confirmed
        # via TestFlight on iOS 26.5 — cairn was failing every connection
        # to a Wi-Fi-reachable Immich because the key wasn't declared.
        NSLocalNetworkUsageDescription: >-
          cairn connects to your Immich server, which is usually on your
          local network. Allowing this lets cairn reach the server URL
          you entered during setup. No other network access is made.
        # App Transport Security: allow plain-HTTP connections to RFC
        # 1918 private IP ranges and .local hostnames. Self-hosted
        # Immich users frequently expose the container on
        # `http://192.168.x.x:2283` with no TLS termination — that's
        # the documented direct-access URL in Immich's own setup
        # guide. Without this exception ATS blocks the connection
        # silently at the OS layer, indistinguishable from a network
        # error. `NSAllowsLocalNetworking` is the Apple-blessed
        # narrow opt-in for this case — it does NOT open the door
        # to plain HTTP for public hostnames, which would be the
        # case if we instead set `NSAllowsArbitraryLoads`.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        # Background refresh task identifiers — must match the values passed
        # to BGTaskScheduler.shared.register() at app launch.
        #   - app.cairn.refresh → short BGAppRefreshTask (~30s) for the
        #     incremental persistent-change reconciler pass.
        #   - app.cairn.hash → long BGProcessingTask (several minutes) for
        #     the initial full-library hash, only until the first scan lands.
        BGTaskSchedulerPermittedIdentifiers:
          - app.cairn.refresh
          - app.cairn.hash
        # Enables the "Background App Refresh" toggle on the app's per-app
        # Settings page. `fetch` pairs with BGAppRefreshTask; `processing`
        # pairs with BGProcessingTask. Without these, iOS hides the toggle
        # entirely and neither task type is allowed to run in background.
        UIBackgroundModes:
          - fetch
          - processing
        # Skips the App Store export-compliance question on every upload.
        # cairn uses only standard system crypto (CryptoKit SHA1) so this is true.
        ITSAppUsesNonExemptEncryption: false
        # Modern launch screen — empty dict is fine, defaults to a system-rendered
        # plain background. Add image references here later if we want a splash.
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        # Persist `.info`-level os.Logger entries in the device archive
        # so `log collect --device` retroactively captures the
        # `[cairn.recon.timing]` and `[cairn.sync] ...` lines (both
        # logged at .info). Without this, iOS only persists `.notice`
        # and above — Console.app's live stream sees everything, but
        # the persistent archive that `log collect` reads from drops
        # info-level entries. The cost is a slightly larger device log
        # buffer; the benefit is that diagnosing a sync that ran ten
        # minutes ago doesn't require a live capture session.
        OSLogPreferences:
          app.cairn.ios:
            DEFAULT-OPTIONS:
              Enable-Private-Data: true
              Level:
                Enable: Info
                Persist: Info
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1"            # iPhone only (no iPad for v1)
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        # Code signing — team ID baked in so XcodeGen regenerations
        # (which `make beta` triggers via bump_build → generate) don't
        # blow away the team selection. Same value as the Matchfile.
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: "7VBG686USB"
        PRODUCT_BUNDLE_IDENTIFIER: app.cairn.ios

  # UI tests — only used for Fastlane snapshot capture (App Store +
  # README screenshots). The app is driven through representative
  # states via `-CAIRN_SCREENSHOT_MODE 1` launch arg, which swaps the
  # real dependency wiring for preview fixtures inside
  # `AppDependencies.bootstrap`.
  CairnUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CairnUITests
    dependencies:
      - target: Cairn
    settings:
      base:
        TEST_TARGET_NAME: Cairn
        PRODUCT_BUNDLE_IDENTIFIER: app.cairn.ios.uitests
        # Auto-generated Info.plist — UITest bundles don't need a
        # custom one, and hand-rolling an Info.plist in the repo
        # just creates a second source of truth to keep in sync
        # with XcodeGen.
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "7VBG686USB"

# Explicit shared scheme so fastlane's test runner has a stable
# Testable list. XcodeGen's default auto-schemes live under
# xcuserdata/ and aren't committed; fastlane can find them in this
# checkout but they don't survive a fresh clone on CI. A shared
# scheme also makes it explicit which target owns the Test action.
schemes:
  Cairn:
    build:
      targets:
        Cairn: all
        CairnUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - CairnUITests
      gatherCoverageData: false
    archive:
      config: Release
    profile:
      config: Release
    analyze:
      config: Debug
